<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Art of Prana</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#f7f2eb] text-[#3d312c] font-sans">

<section class="relative h-screen flex items-center justify-center text-center px-6"
style="background-image:url('https://images.unsplash.com/photo-1518611012118-696072aa579a?q=80&w=1600&auto=format&fit=crop');background-size:cover;background-position:center;">

<div class="absolute inset-0 bg-black/40"></div>

<div class="relative z-10 max-w-3xl text-white">
<p class="uppercase tracking-[0.3em] text-sm mb-4">Yoga • Breath • Art • Healing</p>

<h1 class="text-5xl md:text-7xl font-light mb-6">
The Art of Prana
</h1>

<p class="text-lg md:text-xl opacity-90 mb-8">
Where movement, breath, and creativity become one experience.
</p>

<a href="#booking"
class="bg-white text-[#3d312c] px-8 py-4 rounded-full inline-block">
Reserve Your Spot
</a>
</div>
</section>

<section id="booking" class="bg-[#3d312c] text-white py-24 px-6">
<div class="max-w-3xl mx-auto text-center">

<h2 class="text-5xl font-light mb-6">
Join The Next Experience
</h2>

<div class="bg-white text-[#3d312c] rounded-3xl p-8 text-left shadow-2xl">

<input placeholder="Your Name"
class="w-full border border-[#ddd] rounded-xl px-4 py-4 outline-none mb-4" />

<input placeholder="Email Address"
class="w-full border border-[#ddd] rounded-xl px-4 py-4 outline-none mb-4" />

<button
class="w-full bg-[#3d312c] text-white py-4 rounded-xl text-lg">
Complete Booking & Payment
</button>

</div>
</div>
</section>

</body>
</html>
